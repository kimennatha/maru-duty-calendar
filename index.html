<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>마루 당직·휴가 캘린더</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans, Arial, sans-serif);background:var(--color-background-primary,#fff);color:var(--color-text-primary,#222)}
.wrap{padding:1rem 0}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.btn{font-size:12px;padding:6px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer;white-space:nowrap}
.btn:hover{background:var(--color-background-secondary)}
.btn.green{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn.green:hover{background:#0F6E56}
.btn.blue{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.blue:hover{background:#0C447C}
.btn.google{background:#fff;color:#444;border:0.5px solid #ddd;display:flex;align-items:center;gap:6px}
.btn.google:hover{background:#f5f5f5}
.btn.red{background:#A32D2D;color:#fff;border-color:#A32D2D}
.btn.red:hover{background:#791F1F}
.nav{display:flex;align-items:center;gap:6px}
.nav button{font-size:16px;padding:4px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer}
.nav button:hover{background:var(--color-background-secondary)}
.month-label{font-size:15px;font-weight:500;min-width:90px;text-align:center;color:var(--color-text-primary)}
.status-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--border-radius-md);font-size:12px;margin-bottom:1rem;background:var(--color-background-secondary);color:var(--color-text-secondary)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#888;flex-shrink:0}
.status-dot.connected{background:#1D9E75}
.status-dot.loading{background:#EF9F27;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;text-align:center}
.stat-name{font-size:11px;margin-bottom:3px}
.stat-num{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.stat-sub{font-size:10px;color:var(--color-text-tertiary)}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:0.75rem;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:9px;height:9px;border-radius:2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);overflow:hidden}
.day-header{background:var(--color-background-secondary);font-size:11px;font-weight:500;text-align:center;padding:6px 2px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
.day-header:first-child{color:#E24B4A}
.day-header:last-child{color:#378ADD}
.cell{min-height:82px;border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);padding:4px;background:var(--color-background-primary);cursor:pointer;transition:background 0.1s}
.cell:hover{background:var(--color-background-secondary)}
.cell.empty{background:var(--color-background-tertiary);cursor:default}
.cell.today .dnum{background:#1D9E75;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.dnum{font-size:11px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px;display:inline-flex}
.sun .dnum{color:#E24B4A}
.sat .dnum{color:#378ADD}
.tag{font-size:12px;font-weight:600;padding:3px 5px;border-radius:4px;margin-bottom:3px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.t-duty{background:#E6F1FB;color:#185FA5}
.t-event{background:#EAF3DE;color:#3B6D11}
.t-holiday{background:#FCEBEB;color:#A32D2D}
.t-leave{background:#FAEEDA;color:#854F0B}
.t-gcal{background:#EEEDFE;color:#3C3489}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#ffffff;border-radius:14px;padding:1.25rem;width:320px;max-width:95vw;border:1px solid #d9d9d9;box-shadow:0 12px 34px rgba(0,0,0,0.22);color:#222}
.modal h3{font-size:14px;font-weight:700;margin-bottom:0.75rem;color:#111}
.modal label{font-size:11px;color:#555;display:block;margin-bottom:3px;font-weight:600}
.modal input,.modal select{width:100%;margin-bottom:10px;font-size:13px;padding:7px 10px;border:1px solid #cfcfcf;border-radius:8px;background:#ffffff;color:#111;outline:none}
.modal input:focus,.modal select:focus{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,0.16)}
.modal .elist{background:#ffffff;color:#222}
.erow{background:#ffffff;color:#222}
.erow span{color:inherit}
.modal p{color:#555}
.modal .btn{background:#ffffff;color:#222;border:1px solid #cfcfcf}
.modal .btn.green{background:#1D9E75;color:#ffffff;border-color:#1D9E75}
.modal .btn.red{background:#A32D2D;color:#ffffff;border-color:#A32D2D}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.elist{margin-top:6px;max-height:200px;overflow-y:auto}
.erow{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.erow:last-child{border:none}
.edit{font-size:10px;color:#185FA5;background:none;border:none;cursor:pointer;padding:0 4px;margin-left:auto;flex-shrink:0}
.copy{font-size:10px;color:#1D9E75;background:none;border:none;cursor:pointer;padding:0 4px;margin-left:auto;flex-shrink:0}
.del{font-size:10px;color:#E24B4A;background:none;border:none;cursor:pointer;padding:0 2px;flex-shrink:0}
.gcal-badge{font-size:9px;background:#EEEDFE;color:#3C3489;padding:1px 4px;border-radius:3px;flex-shrink:0}

.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#F7F8FA}
.auth-card{width:360px;max-width:92vw;background:#fff;border:1px solid #E1E4E8;border-radius:16px;padding:26px 22px;box-shadow:0 10px 28px rgba(0,0,0,0.08);text-align:center}
.auth-card h1{font-size:20px;margin-bottom:8px;color:#222}
.auth-card p{font-size:13px;line-height:1.6;color:#666;margin-bottom:16px}
.auth-card input{width:100%;font-size:15px;padding:11px 12px;border:1px solid #D0D7DE;border-radius:10px;margin-bottom:10px}
.auth-card button{width:100%;font-size:14px;padding:11px 12px;border:0;border-radius:10px;background:#1D9E75;color:#fff;cursor:pointer}
.auth-card button:hover{background:#0F6E56}
.auth-error{min-height:18px;font-size:12px;color:#A32D2D;margin-top:8px}
.app-hidden{display:none}

</style>
</head>
<body>


<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <h1>마루 당직·휴가 캘린더</h1>
    <p>내부 공유용 일정표입니다.<br>비밀번호를 입력하면 달력이 열립니다.</p>
    <input type="password" id="app-password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') checkPassword()">
    <button onclick="checkPassword()">열기</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div class="wrap app-hidden" id="app-wrap">
<div class="top-bar">
  <div class="nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="mlabel"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div id="gcal-btn-wrap">
    <button class="btn google" id="gcal-btn" onclick="handleGcalBtn()">
      <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      구글 캘린더 연동
    </button>
  </div>
  <button class="btn green" onclick="autoAssign()">⟳ 당직 자동배정</button>
  <button class="btn blue" onclick="exportExcel()">↓ 엑셀 저장</button>
  <button class="btn" onclick="openAdd()">+ 추가</button>
</div>

<div class="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">구글 캘린더 연동 전입니다. 위 버튼을 눌러 연동해 주세요.</span>
</div>

<div class="stats-bar" id="stats-bar"></div>
<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#B5D4F4"></div>당직</div>
  <div class="leg-item"><div class="leg-dot" style="background:#C0DD97"></div>행사·교육</div>
  <div class="leg-item"><div class="leg-dot" style="background:#F7C1C1"></div>공휴일</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FAC775"></div>휴가</div>
  <div class="leg-item"><div class="leg-dot" style="background:#CECBF6"></div>구글 캘린더</div>
</div>
<div class="cal-grid" id="cal"></div>
</div>

<div class="modal-bg" id="add-modal" style="display:none">
<div class="modal">
  <h3 id="add-modal-title">일정 추가</h3>
  <label>날짜</label><input type="date" id="inp-date">
  <label>종류</label>
  <select id="inp-type">
    <option value="duty">당직</option>
    <option value="event">행사·교육</option>
    <option value="holiday">공휴일</option>
    <option value="leave">휴가</option>
  </select>
  <label>내용</label><input type="text" id="inp-text" placeholder="예: 김진경 T, 어린이날, 안전교육">
  <div class="modal-btns">
    <button class="btn" onclick="closeAdd()">취소</button>
    <button class="btn green" id="save-entry-btn" onclick="saveEntry()">저장</button>
  </div>
</div>
</div>

<div class="modal-bg" id="detail-modal" style="display:none">
<div class="modal">
  <h3 id="dtitle"></h3>
  <div class="elist" id="elist"></div>
  <div class="modal-btns" style="margin-top:10px">
    <button class="btn" onclick="closeDetail()">닫기</button>
    <button class="btn green" onclick="addFromDetail()">+ 추가</button>
  </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const APP_PASSWORD = 'maru2026';
function checkPassword(){
  const v=document.getElementById('app-password').value;
  if(v===APP_PASSWORD){
    sessionStorage.setItem('maruCalendarAuth','ok');
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-wrap').classList.remove('app-hidden');
  }else{
    document.getElementById('auth-error').textContent='비밀번호가 맞지 않습니다.';
  }
}
function initPasswordGate(){
  if(sessionStorage.getItem('maruCalendarAuth')==='ok'){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-wrap').classList.remove('app-hidden');
  }
}
const CLIENT_ID = '682075457599-5p3hujotoftlcbk629b8t3mmqbmrfu0k.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';
const TEACHERS = ['김진경 T','장현주 T','박정노 T','장연옥 T'];
const TC = ['#185FA5','#3B6D11','#854F0B','#B23A48'];
const TB = ['#E6F1FB','#EAF3DE','#FAEEDA','#FDE2E4'];
const DAYS = ['일','월','화','수','목','금','토'];
const MKR = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

let cur = new Date(2026, 4, 1);
let selDate = null;
let editKey = null;
let editIndex = null;
let gapiReady = false;
let gisReady = false;
let tokenClient = null;
let isSignedIn = false;

let data = {
  '2026-05-05':[{type:'holiday',text:'어린이날'}],
  '2026-05-08':[{type:'event',text:'어버이날'}],
  '2026-05-15':[{type:'event',text:'스승의날'}],
  '2026-05-25':[{type:'holiday',text:'대체공휴일'}],
};

function key(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function todayKey(){let t=new Date();return key(t.getFullYear(),t.getMonth(),t.getDate())}
function isHoliday(k){return (data[k]||[]).some(e=>e.type==='holiday')}

// 한국 시간 기준 날짜 처리
// Google Calendar의 하루 종일 일정은 YYYY-MM-DD 그대로 사용하고,
// 시간이 있는 일정은 Asia/Seoul 기준으로 다시 계산해 하루 밀림을 방지합니다.
function pad2(n){return String(n).padStart(2,'0')}
function koreanDateStringFromDate(date){
  const parts=new Intl.DateTimeFormat('en-CA',{
    timeZone:'Asia/Seoul', year:'numeric', month:'2-digit', day:'2-digit'
  }).formatToParts(date).reduce((acc,p)=>{acc[p.type]=p.value;return acc;},{});
  return `${parts.year}-${parts.month}-${parts.day}`;
}
function koreanMonthStartIso(y,m){return `${y}-${pad2(m+1)}-01T00:00:00+09:00`}
function koreanNextMonthStartIso(y,m){
  const ny=m===11?y+1:y;
  const nm=m===11?0:m+1;
  return `${ny}-${pad2(nm+1)}-01T00:00:00+09:00`;
}
function googleEventStartDateKey(ev){
  if(ev.start && ev.start.date) return ev.start.date; // 하루 종일 일정: 날짜 문자열을 그대로 사용
  if(ev.start && ev.start.dateTime) return koreanDateStringFromDate(new Date(ev.start.dateTime));
  return null;
}

// Google API 로드
function loadGapiScript(){
  return new Promise(res=>{
    const s=document.createElement('script');
    s.src='https://apis.google.com/js/api.js';
    s.onload=()=>{
      gapi.load('client',async()=>{
        await gapi.client.init({});
        await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest');
        gapiReady=true;
        res();
      });
    };
    document.head.appendChild(s);
  });
}

function loadGisScript(){
  return new Promise(res=>{
    const s=document.createElement('script');
    s.src='https://accounts.google.com/gsi/client';
    s.onload=()=>{
      tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID,
        scope:SCOPES,
        callback:async(resp)=>{
          if(resp.error){setStatus('연동 실패: '+resp.error,false);return;}
          isSignedIn=true;
          setStatus('구글 캘린더 연동됨',true);
          document.getElementById('gcal-btn').innerHTML=`<span style="color:#1D9E75">✓</span> 연동됨`;
          document.getElementById('gcal-btn').onclick=fetchGcalEvents;
          await fetchGcalEvents();
        }
      });
      gisReady=true;
      res();
    };
    document.head.appendChild(s);
  });
}

async function handleGcalBtn(){
  setStatus('구글 로그인 준비 중...', false, true);
  if(!gapiReady||!gisReady){
    await Promise.all([loadGapiScript(), loadGisScript()]);
  }
  tokenClient.requestAccessToken({prompt:'consent'});
}

function setStatus(msg, connected, loading){
  const dot=document.getElementById('status-dot');
  dot.className='status-dot'+(connected?' connected':loading?' loading':'');
  document.getElementById('status-text').textContent=msg;
}

async function fetchGcalEvents(){
  if(!isSignedIn){handleGcalBtn();return;}
  setStatus('구글 캘린더 불러오는 중...', false, true);
  const y=cur.getFullYear(), m=cur.getMonth();
  // UTC 변환(toISOString) 대신 한국 시간(+09:00) 기준 범위를 직접 전달합니다.
  // 이렇게 해야 구글 캘린더 일정이 하루 앞/뒤로 밀리지 않습니다.
  const timeMin=koreanMonthStartIso(y,m);
  const timeMax=koreanNextMonthStartIso(y,m);
  try{
    const resp=await gapi.client.calendar.events.list({
      calendarId:'primary',
      timeMin, timeMax,
      timeZone:'Asia/Seoul',
      singleEvents:true,
      orderBy:'startTime',
      maxResults:100
    });
    const events=resp.result.items||[];
    // 기존 gcal 항목 제거
    Object.keys(data).forEach(k=>{
      if(data[k]) data[k]=data[k].filter(e=>e.type!=='gcal');
    });
    let count=0;
    events.forEach(ev=>{
      const d=googleEventStartDateKey(ev);
      if(!d) return;
      if(!data[d]) data[d]=[];
      // 중복 방지
      if(!data[d].some(e=>e.type==='gcal'&&e.text===ev.summary)){
        data[d].push({type:'gcal', text:ev.summary||'(제목 없음)'});
        count++;
      }
    });
    setStatus(`구글 캘린더 연동됨 · 이번 달 일정 ${count}개 불러옴`, true);
    render();
  } catch(e){
    setStatus('불러오기 실패: '+e.message, false);
  }
}

function autoAssign(){
  const y=cur.getFullYear(), m=cur.getMonth();
  const last=new Date(y,m+1,0).getDate();
  for(let d=1;d<=last;d++){
    const k=key(y,m,d);
    if(data[k]) data[k]=data[k].filter(e=>e.type!=='duty');
  }
  let idx = cur.getMonth() % TEACHERS.length;
  for(let d=1;d<=last;d++){
    const k=key(y,m,d);
    const dow=new Date(y,m,d).getDay();
    if(dow===0||dow===6) continue;
    if(isHoliday(k)) continue;
    if(!data[k]) data[k]=[];
    data[k].push({type:'duty', text:TEACHERS[idx%TEACHERS.length]});
    idx++;
  }
  render();
  setStatus(isSignedIn?'구글 캘린더 연동됨 · 당직 자동배정 완료!':'당직 자동배정 완료! 구글 캘린더도 연동해보세요.', isSignedIn);
}

function render(){
  const y=cur.getFullYear(), m=cur.getMonth();
  document.getElementById('mlabel').textContent=`${y}년 ${MKR[m]}`;
  if(isSignedIn){
    document.getElementById('gcal-btn').innerHTML=`<span style="color:#1D9E75;font-size:13px">✓</span> <span style="font-size:12px">다시 불러오기</span>`;
    document.getElementById('gcal-btn').onclick=fetchGcalEvents;
  }
  const cal=document.getElementById('cal');
  cal.innerHTML=DAYS.map(d=>`<div class="day-header">${d}</div>`).join('');
  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  const td=todayKey();
  for(let i=0;i<first;i++) cal.innerHTML+=`<div class="cell empty"></div>`;
  for(let d=1;d<=last;d++){
    const k=key(y,m,d);
    const dow=new Date(y,m,d).getDay();
    const cls=(dow===0?' sun':dow===6?' sat':'');
    const isToday=k===td;
    const entries=data[k]||[];
    let tags=entries.slice(0,3).map(e=>{
      if(e.type==='duty'){
        const ti=TEACHERS.indexOf(e.text);
        return `<span class="tag" style="background:#FFFFFF;color:${ti>=0?TC[ti]:'#185FA5'};border:1px solid ${ti>=0?TC[ti]:'#185FA5'}">${e.text}</span>`;
      }
      return `<span class="tag t-${e.type}">${e.text}</span>`;
    }).join('');
    if(entries.length>3) tags+=`<span style="font-size:9px;color:var(--color-text-tertiary)">+${entries.length-3}</span>`;
    cal.innerHTML+=`<div class="cell${cls}${isToday?' today':''}" onclick="openDetail('${k}',${d})">
      <div class="dnum">${d}</div>${tags}</div>`;
  }
  const rem=(7-(first+last)%7)%7;
  for(let i=0;i<rem;i++) cal.innerHTML+=`<div class="cell empty"></div>`;
  renderStats();
}

function renderStats(){
  const y=cur.getFullYear(), m=cur.getMonth();
  const last=new Date(y,m+1,0).getDate();
  const counts=TEACHERS.map(()=>0);
  for(let d=1;d<=last;d++){
    (data[key(y,m,d)]||[]).forEach(e=>{
      if(e.type==='duty'){const i=TEACHERS.indexOf(e.text);if(i>=0)counts[i]++;}
    });
  }
  document.getElementById('stats-bar').innerHTML=TEACHERS.map((t,i)=>`
    <div class="stat-card">
      <div class="stat-name" style="color:${TC[i]}">${t}</div>
      <div class="stat-num">${counts[i]}</div>
      <div class="stat-sub">당직 횟수</div>
    </div>`).join('');
}

function changeMonth(d){
  cur.setMonth(cur.getMonth()+d);
  render();
  if(isSignedIn) fetchGcalEvents();
}

function resetEditMode(){
  editKey = null;
  editIndex = null;
  document.getElementById('add-modal-title').textContent='일정 추가';
  document.getElementById('save-entry-btn').textContent='저장';
}

function openAdd(pre){
  resetEditMode();
  document.getElementById('inp-date').value=pre||'';
  document.getElementById('inp-type').value='duty';
  document.getElementById('inp-text').value='';
  document.getElementById('add-modal').style.display='flex';
}
function closeAdd(){
  document.getElementById('add-modal').style.display='none';
  resetEditMode();
}
function saveEntry(){
  const d=document.getElementById('inp-date').value;
  const t=document.getElementById('inp-type').value;
  const tx=document.getElementById('inp-text').value.trim();
  if(!d||!tx){alert('날짜와 내용을 입력해주세요');return}

  if(editKey!==null && editIndex!==null){
    if(data[editKey] && data[editKey][editIndex]){
      data[editKey].splice(editIndex,1);
      if(!data[editKey].length) delete data[editKey];
    }
  }

  if(!data[d]) data[d]=[];
  data[d].push({type:t,text:tx});
  closeAdd();
  render();
  if(selDate){
    if(document.getElementById('detail-modal').style.display==='flex'){
      renderElist(selDate);
    }
  }
}

function editEntry(k,i){
  const e=(data[k]||[])[i];
  if(!e) return;
  if(e.type==='gcal'){
    alert('구글 캘린더에서 불러온 일정은 이 앱에서 직접 수정할 수 없어요. 구글 캘린더에서 수정한 뒤 다시 불러오기를 눌러주세요.');
    return;
  }
  editKey=k;
  editIndex=i;
  document.getElementById('add-modal-title').textContent='일정 수정';
  document.getElementById('save-entry-btn').textContent='수정 저장';
  document.getElementById('inp-date').value=k;
  document.getElementById('inp-type').value=e.type;
  document.getElementById('inp-text').value=e.text;
  document.getElementById('detail-modal').style.display='none';
  document.getElementById('add-modal').style.display='flex';
}

function copyGcalEntry(k,i){
  const e=(data[k]||[])[i];
  if(!e) return;
  // 구글 원본은 그대로 두고, 앱 안에서 수정 가능한 일반 일정으로 복사합니다.
  editKey=null;
  editIndex=null;
  document.getElementById('add-modal-title').textContent='구글 일정 복사 후 편집';
  document.getElementById('save-entry-btn').textContent='복사 저장';
  document.getElementById('inp-date').value=k;
  document.getElementById('inp-type').value='event';
  document.getElementById('inp-text').value=e.text;
  document.getElementById('detail-modal').style.display='none';
  document.getElementById('add-modal').style.display='flex';
}

function openDetail(k,d){
  selDate=k;
  const pts=k.split('-');
  document.getElementById('dtitle').textContent=`${pts[0]}년 ${parseInt(pts[1])}월 ${d}일`;
  renderElist(k);
  document.getElementById('detail-modal').style.display='flex';
}
function renderElist(k){
  const entries=data[k]||[];
  const lbl={duty:'당직',event:'행사',holiday:'공휴일',leave:'휴가',gcal:'구글'};
  if(!entries.length){
    document.getElementById('elist').innerHTML='<p style="font-size:12px;color:#555;padding:8px 0">등록된 일정이 없습니다.</p>';
    return;
  }
  document.getElementById('elist').innerHTML=entries.map((e,i)=>{
    const ti=e.type==='duty'?TEACHERS.indexOf(e.text):-1;
    const bg=e.type==='duty'?'#FFFFFF':ti>=0?TB[ti]:e.type==='event'?'#EAF3DE':e.type==='holiday'?'#FCEBEB':e.type==='gcal'?'#EEEDFE':'#FAEEDA';
    const co=ti>=0?TC[ti]:e.type==='event'?'#3B6D11':e.type==='holiday'?'#A32D2D':e.type==='gcal'?'#3C3489':'#854F0B';
    const editBtn=e.type==='gcal'?`<button class="copy" onclick="copyGcalEntry('${k}',${i})">복사</button>`:`<button class="edit" onclick="editEntry('${k}',${i})">수정</button>`;
    const delBtn=e.type==='gcal'?'':`<button class="del" onclick="delEntry('${k}',${i})">삭제</button>`;
    const gcalBadge=e.type==='gcal'?'<span class="gcal-badge">구글원본</span>':'';
    return `<div class="erow">
      <span class="tag" style="background:${bg};color:${co};border:${e.type==='duty'?'1px solid '+co:'none'};margin:0;flex-shrink:0">${lbl[e.type]}</span>
      <span style="flex:1;color:#222;font-size:12px;padding:0 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.text}</span>
      ${gcalBadge}${editBtn}${delBtn}
    </div>`;
  }).join('');
}
function delEntry(k,i){
  const e=(data[k]||[])[i];
  if(!e) return;
  if(!confirm(`'${e.text}' 일정을 삭제할까요?`)) return;
  data[k].splice(i,1);
  if(!data[k].length)delete data[k];
  renderElist(k);render();
}
function closeDetail(){document.getElementById('detail-modal').style.display='none'}
function addFromDetail(){closeDetail();openAdd(selDate);}

function exportExcel(){
  const y=cur.getFullYear(), m=cur.getMonth();
  const last=new Date(y,m+1,0).getDate();
  const wsData=[[`${y}년 ${MKR[m]} 당직·행사표`],[],['일','월','화','수','목','금','토']];
  const first=new Date(y,m,1).getDay();
  let week=Array(7).fill(''), dutyW=Array(7).fill(''), evW=Array(7).fill(''), gcalW=Array(7).fill('');
  for(let i=0;i<first;i++){week[i]='';dutyW[i]='';evW[i]='';gcalW[i]='';}
  for(let d=1;d<=last;d++){
    const dow=new Date(y,m,d).getDay();
    const k=key(y,m,d);
    const entries=data[k]||[];
    week[dow]=d;
    dutyW[dow]=entries.filter(e=>e.type==='duty').map(e=>e.text).join(', ');
    evW[dow]=entries.filter(e=>e.type!=='duty'&&e.type!=='gcal').map(e=>e.text).join(', ');
    gcalW[dow]=entries.filter(e=>e.type==='gcal').map(e=>e.text).join(', ');
    if(dow===6||d===last){
      wsData.push([...week]);
      wsData.push(dutyW.map(v=>v||''));
      wsData.push(evW.map(v=>v||''));
      if(isSignedIn) wsData.push(gcalW.map(v=>v||''));
      wsData.push(Array(7).fill(''));
      week=Array(7).fill('');dutyW=Array(7).fill('');evW=Array(7).fill('');gcalW=Array(7).fill('');
    }
  }
  wsData.push([],[isSignedIn?'구글 캘린더 포함':'','선생님','당직 횟수']);
  const counts=TEACHERS.map(()=>0);
  for(let d=1;d<=last;d++){
    (data[key(y,m,d)]||[]).forEach(e=>{
      if(e.type==='duty'){const i=TEACHERS.indexOf(e.text);if(i>=0)counts[i]++;}
    });
  }
  TEACHERS.forEach((t,i)=>wsData.push(['',t,counts[i]]));
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:5},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:5}];
  XLSX.utils.book_append_sheet(wb,ws,`${y}년 ${m+1}월`);
  XLSX.writeFile(wb,`당직표_${y}년_${m+1}월.xlsx`);
}

initPasswordGate();
render();
</script>
